<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fechamento do Cupom</title>
    <link rel="stylesheet" href="finaliza.css">
</head>
<body>

    <div class="caixa">

        <div class="topo">
            <h1>Fechamento do Cupom</h1>
        </div>

        <div class="dados-cliente">

            <div class="campo">
                <label>Cliente</label>
                <input type="text">
                <button>...</button>
            </div>

            <div class="campo">
                <label>Vendedor</label>

                <select>
                    <option>Selecione</option>
                    <option>Ivanete</option>
                    <option>João</option>
                    <option>Maria</option>
                </select>
            </div>

        </div>

        <div class="resumo">

            <div class="item">
                <span>Valor :</span>
                <input class="valor" type="number" step="0.01">
            </div>

            <div class="item">
                <span>Pago :</span>
                <input class="valor" type="number" step="0.01">
            </div>

            <div class="item">
                <span>Falta :</span>
                <input class="valor" type="number" step="0.01">
            </div>

        </div>

        <div class="mensagem">
            AGUARDE, FINALIZANDO A VENDA
        </div>

        <div class="total">

            <div class="item-total">
                <span>TOTAL A PAGAR :</span>
                <input class="valor" type="number" step="0.01">
            </div>

            <div class="item-total">
                <span>TROCO :</span>
                <input class="valor-total" type="number" step="0.01">
            </div>

        </div>

        <div class="pagamentos">

            <div class="linha">
                <span>Dinheiro</span>
                <input class="valor" type="number" step="0.01">
            </div>

        </div>

        <div class="rodape">
            Recebimento finalizado...
        </div>

    </div>

</body>
</html>
